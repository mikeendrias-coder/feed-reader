<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Feed Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --border: #e2ddd6;
    --text: #2c2825;
    --muted: #6b6560;
    --accent: #1a5c4c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .app { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }

  header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 2px solid var(--text); }
  header h1 { font-family: 'Source Serif 4', Georgia, serif; font-size: 26px; font-weight: 700; letter-spacing: -0.4px; }
  header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .controls { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; align-items: center; }
  .btn { font-family: inherit; font-size: 12px; font-weight: 500; padding: 5px 13px; border: 1px solid var(--border); border-radius: 18px; background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.12s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.refresh { margin-left: auto; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .status { font-size: 11px; color: var(--muted); margin-bottom: 14px; display: flex; justify-content: space-between; }
  .errors { font-size: 12px; color: #9b5e3a; background: #fdf5ee; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; }

  .feed-list { display: flex; flex-direction: column; }
  .item { background: var(--surface); padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .item:first-child { border-radius: 8px 8px 0 0; }
  .item:last-child { border-radius: 0 0 8px 8px; border-bottom: none; }
  .item:only-child { border-radius: 8px; }
  .item:hover { background: #fdfcfb; }

  .item-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; padding: 2px 7px; border-radius: 3px; white-space: nowrap; }
  .tag-epic { background: #fdf3e8; color: #8b5a2b; }
  .tag-cdt { background: #e8f0fd; color: #2b5e8b; }
  .tag-eff { background: #fde8e8; color: #8b2b2b; }
  .tag-nyclu { background: #f0e8fd; color: #5a2b8b; }
  .tag-brennan { background: #e8fdf0; color: #2b8b5a; }

  .item-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .item-title { font-family: 'Source Serif 4', Georgia, serif; font-size: 16px; font-weight: 600; line-height: 1.35; margin-bottom: 4px; }
  .item-title a { color: var(--text); text-decoration: none; }
  .item-title a:hover { color: var(--accent); }
  .item-summary { font-size: 12.5px; color: var(--muted); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  @media (max-width: 600px) {
    .app { padding: 20px 14px 60px; }
    header h1 { font-size: 21px; }
    .item { padding: 12px 14px; }
    .item-title { font-size: 14.5px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Research Feed Tracker</h1>
    <p>Surveillance, privacy, and civil liberties publications from peer organizations</p>
  </header>
  <div class="controls" id="controls"></div>
  <div id="errors"></div>
  <div id="status"></div>
  <div id="content"></div>
</div>

<script>
const FEEDS = [
  { name: "EPIC", slug: "epic", url: "https://epic.org/content-types/publication/feed/" },
  { name: "CDT", slug: "cdt", url: "https://cdt.org/area-of-focus/government-surveillance/feed/" },
  { name: "EFF", slug: "eff", url: "https://www.eff.org/rss/updates.xml" },
  { name: "NYCLU", slug: "nyclu", url: "https://nyclu.substack.com/feed" },
  { name: "Brennan Center", slug: "brennan", url: "https://brennancenter.substack.com/feed" }
];

const PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";
let allItems = [];
let currentFilter = "all";
let lastUpdated = null;

function decodeEntities(str) {
  if (!str) return "";
  const el = document.createElement("textarea");
  el.innerHTML = str;
  return el.value;
}

function stripHtml(str) {
  if (!str) return "";
  const div = document.createElement("div");
  div.innerHTML = str;
  return (div.textContent || div.innerText || "").replace(/\s+/g, " ").trim().slice(0, 300);
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
}

function daysAgo(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return 999;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

async function fetchFeed(feed) {
  try {
    const resp = await fetch(PROXY + encodeURIComponent(feed.url) + "&count=50");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    if (data.status !== "ok" || !data.items) throw new Error("Bad response");
    return data.items.map(function(item) {
      return {
        org: feed.name,
        slug: feed.slug,
        title: decodeEntities(item.title || ""),
        link: item.link || "",
        date: item.pubDate || "",
        summary: stripHtml(item.description || ""),
        timestamp: new Date(item.pubDate || 0).getTime()
      };
    });
  } catch (e) {
    console.error("Failed: " + feed.name, e);
    return { error: feed.name, message: e.message };
  }
}

async function loadAllFeeds() {
  document.getElementById("content").innerHTML = '<div class="loading"><div class="spinner"></div>Fetching feeds...</div>';
  document.getElementById("errors").innerHTML = "";
  document.getElementById("status").innerHTML = "";
  setRefreshDisabled(true);

  const results = await Promise.all(FEEDS.map(fetchFeed));
  allItems = [];
  const errors = [];

  for (let i = 0; i < results.length; i++) {
    const r = results[i];
    if (Array.isArray(r)) {
      allItems = allItems.concat(r);
    } else if (r && r.error) {
      errors.push(r.error);
    }
  }

  allItems.sort(function(a, b) { return b.timestamp - a.timestamp; });
  lastUpdated = new Date();

  if (errors.length > 0) {
    document.getElementById("errors").innerHTML = '<div class="errors">Could not fetch: ' + errors.join(", ") + '. Try refreshing.</div>';
  }

  renderControls();
  renderItems();
  setRefreshDisabled(false);
}

function setRefreshDisabled(disabled) {
  const btn = document.getElementById("refresh-btn");
  if (btn) {
    btn.disabled = disabled;
    btn.textContent = disabled ? "Loading..." : "Refresh";
  }
}

function renderControls() {
  const counts = {};
  for (let i = 0; i < allItems.length; i++) {
    counts[allItems[i].slug] = (counts[allItems[i].slug] || 0) + 1;
  }

  let html = '<button class="btn ' + (currentFilter === "all" ? "active" : "") + '" onclick="setFilter(\'all\')">All (' + allItems.length + ')</button>';
  for (let i = 0; i < FEEDS.length; i++) {
    const f = FEEDS[i];
    const count = counts[f.slug] || 0;
    html += '<button class="btn ' + (currentFilter === f.slug ? "active" : "") + '" onclick="setFilter(\'' + f.slug + '\')">' + f.name + ' (' + count + ')</button>';
  }
  html += '<button class="btn refresh" id="refresh-btn" onclick="loadAllFeeds()">Refresh</button>';
  document.getElementById("controls").innerHTML = html;
}

function setFilter(slug) {
  currentFilter = slug;
  renderControls();
  renderItems();
}

function renderItems() {
  const filtered = currentFilter === "all" ? allItems : allItems.filter(function(i) { return i.slug === currentFilter; });

  const timeStr = lastUpdated ? lastUpdated.toLocaleTimeString() : "";
  document.getElementById("status").innerHTML = '<div class="status"><span>' + filtered.length + ' items</span><span>Updated ' + timeStr + '</span></div>';

  if (filtered.length === 0) {
    document.getElementById("content").innerHTML = '<div class="empty">No items found.</div>';
    return;
  }

  let html = '<div class="feed-list">';
  for (let i = 0; i < filtered.length; i++) {
    const item = filtered[i];
    const isNew = daysAgo(item.date) <= 3;
    const dot = isNew ? "● " : "";

    html += '<div class="item">';
    html += '<div class="item-meta">';
    html += '<span class="tag tag-' + item.slug + '">' + item.org + '</span>';
    html += '<span class="item-date">' + dot + formatDate(item.date) + '</span>';
    html += '</div>';
    html += '<div class="item-title"><a href="' + item.link + '" target="_blank" rel="noopener noreferrer">' + item.title + '</a></div>';
    if (item.summary) {
      html += '<div class="item-summary">' + item.summary + '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById("content").innerHTML = html;
}

// Start
loadAllFeeds();
</script>
</body>
</html>
