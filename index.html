<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Research Feed Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --border: #e2ddd6;
    --text: #2c2825;
    --text-secondary: #6b6560;
    --accent: #1a5c4c;
    --accent-light: #e8f0ed;
    --tag-epic: #8b5a2b;
    --tag-cdt: #2b5e8b;
    --tag-eff: #8b2b2b;
    --tag-nyclu: #5a2b8b;
    --tag-brennan: #2b8b5a;
    --tag-epic-bg: #fdf3e8;
    --tag-cdt-bg: #e8f0fd;
    --tag-eff-bg: #fde8e8;
    --tag-nyclu-bg: #f0e8fd;
    --tag-brennan-bg: #e8fdf0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  .app {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 2px solid var(--text);
  }

  header h1 {
    font-family: 'Source Serif 4', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  header p {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    align-items: center;
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .refresh-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    margin-left: auto;
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .status-bar {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
  }

  .feed-list { display: flex; flex-direction: column; gap: 1px; }

  .feed-item {
    background: var(--surface);
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .feed-item:first-child { border-radius: 8px 8px 0 0; }
  .feed-item:last-child { border-radius: 0 0 8px 8px; border-bottom: none; }
  .feed-item:only-child { border-radius: 8px; }
  .feed-item:hover { background: #fdfcfb; }

  .feed-item-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }

  .org-tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .org-tag.epic { background: var(--tag-epic-bg); color: var(--tag-epic); }
  .org-tag.cdt { background: var(--tag-cdt-bg); color: var(--tag-cdt); }
  .org-tag.eff { background: var(--tag-eff-bg); color: var(--tag-eff); }
  .org-tag.nyclu { background: var(--tag-nyclu-bg); color: var(--tag-nyclu); }
  .org-tag.brennan { background: var(--tag-brennan-bg); color: var(--tag-brennan); }

  .feed-item-date {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .feed-item-title {
    font-family: 'Source Serif 4', serif;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 6px;
  }

  .feed-item-title a {
    color: var(--text);
    text-decoration: none;
  }

  .feed-item-title a:hover {
    color: var(--accent);
  }

  .feed-item-summary {
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .loading-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-list {
    font-size: 12px;
    color: #9b5e3a;
    background: #fdf5ee;
    padding: 8px 14px;
    border-radius: 6px;
    margin-bottom: 16px;
  }

  .empty {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
    font-size: 14px;
  }

  @media (max-width: 600px) {
    .app { padding: 20px 14px 60px; }
    header h1 { font-size: 22px; }
    .feed-item { padding: 14px 16px; }
    .feed-item-title { font-size: 15px; }
    .feed-item-header { flex-wrap: wrap; gap: 6px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">

const FEEDS = [
  { name: "EPIC", slug: "epic", url: "https://epic.org/content-types/publication/feed/" },
  { name: "CDT", slug: "cdt", url: "https://cdt.org/area-of-focus/government-surveillance/feed/" },
  { name: "EFF", slug: "eff", url: "https://www.eff.org/rss/updates.xml" },
  { name: "NYCLU", slug: "nyclu", url: "https://nyclu.substack.com/feed" },
  { name: "Brennan Center", slug: "brennan", url: "https://brennancenter.substack.com/feed" },
];

const PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";

function decodeEntities(str) {
  if (!str) return "";
  const el = document.createElement("textarea");
  el.innerHTML = str;
  return el.value;
}

function stripHtml(str) {
  if (!str) return "";
  const div = document.createElement("div");
  div.innerHTML = str;
  return div.textContent || div.innerText || "";
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function daysAgo(dateStr) {
  if (!dateStr) return 999;
  const d = new Date(dateStr);
  if (isNaN(d)) return 999;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

async function fetchFeed(feed) {
  try {
    const resp = await fetch(PROXY + encodeURIComponent(feed.url) + "&count=50");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.status !== "ok" || !data.items) throw new Error("Bad response");
    return data.items.map(item => ({
      org: feed.name,
      slug: feed.slug,
      title: decodeEntities(item.title || ""),
      link: item.link || "",
      date: item.pubDate || "",
      summary: stripHtml(item.description || "").trim().slice(0, 300),
      timestamp: new Date(item.pubDate || 0).getTime(),
    }));
  } catch (e) {
    console.error(`Failed: ${feed.name}`, e);
    return { error: feed.name };
  }
}

function App() {
  const [items, setItems] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [errors, setErrors] = React.useState([]);
  const [filter, setFilter] = React.useState("all");
  const [lastUpdated, setLastUpdated] = React.useState(null);

  const loadFeeds = React.useCallback(async () => {
    setLoading(true);
    setErrors([]);
    const results = await Promise.all(FEEDS.map(fetchFeed));
    const allItems = [];
    const failedFeeds = [];
    for (const r of results) {
      if (Array.isArray(r)) {
        allItems.push(...r);
      } else if (r && r.error) {
        failedFeeds.push(r.error);
      }
    }
    allItems.sort((a, b) => b.timestamp - a.timestamp);
    setItems(allItems);
    setErrors(failedFeeds);
    setLoading(false);
    setLastUpdated(new Date());
  }, []);

  React.useEffect(() => { loadFeeds(); }, [loadFeeds]);

  const filtered = filter === "all" ? items : items.filter(i => i.slug === filter);
  const counts = {};
  for (const item of items) {
    counts[item.slug] = (counts[item.slug] || 0) + 1;
  }

  return (
    <div className="app">
      <header>
        <h1>Research Feed Tracker</h1>
        <p>Surveillance, privacy, and civil liberties publications from peer organizations</p>
      </header>

      <div className="controls">
        <button
          className={`filter-btn ${filter === "all" ? "active" : ""}`}
          onClick={() => setFilter("all")}
        >
          All ({items.length})
        </button>
        {FEEDS.map(f => (
          <button
            key={f.slug}
            className={`filter-btn ${filter === f.slug ? "active" : ""}`}
            onClick={() => setFilter(f.slug)}
          >
            {f.name} ({counts[f.slug] || 0})
          </button>
        ))}
        <button
          className="refresh-btn"
          onClick={loadFeeds}
          disabled={loading}
        >
          {loading ? "Loading..." : "Refresh"}
        </button>
      </div>

      {errors.length > 0 && (
        <div className="error-list">
          Could not fetch: {errors.join(", ")}. Try refreshing.
        </div>
      )}

      {!loading && (
        <div className="status-bar">
          <span>{filtered.length} items</span>
          {lastUpdated && <span>Updated {lastUpdated.toLocaleTimeString()}</span>}
        </div>
      )}

      {loading ? (
        <div className="loading">
          <div className="loading-spinner" />
          Fetching feeds...
        </div>
      ) : filtered.length === 0 ? (
        <div className="empty">No items found.</div>
      ) : (
        <div className="feed-list">
          {filtered.map((item, idx) => {
            const age = daysAgo(item.date);
            const isNew = age <= 3;
            return (
              <div className="feed-item" key={`${item.slug}-${idx}`}>
                <div className="feed-item-header">
                  <span className={`org-tag ${item.slug}`}>{item.org}</span>
                  <span className="feed-item-date">
                    {isNew && "● "}{formatDate(item.date)}
                  </span>
                </div>
                <div className="feed-item-title">
                  <a href={item.link} target="_blank" rel="noopener noreferrer">
                    {item.title}
                  </a>
                </div>
                {item.summary && (
                  <div className="feed-item-summary">{item.summary}</div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
